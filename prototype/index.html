    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #FAF7F4; color: #1E1E1E; }

    .proto-banner { background: #1E1E1E; color: #FAF7F4; font-size: 12px; text-align: center; padding: 8px 16px; line-height: 1.5; }

    .step.done { color: #9E8E88; }
    .step.locked { color: #C8BEBE; cursor: default; }
    .step-num { width: 16px; height: 16px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

    .step.done .step-num { background: #E5DDD5; color: #6B5E5A; }
    .step.locked .step-num { border: 1px solid #C8BEBE; color: #9E8E88; }

    .screen { display: none; }

    .card { background: white; border: 1px solid #E5DDD5; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

    /* Form elements */
    label { font-size: 11px; font-weight: 600; color: #6B5E5A; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 4px; }
    .hint { font-size: 11px; color: #9E8E88; margin-top: 2px; margin-bottom: 6px; }
    input, textarea { width: 100%; border: 1px solid #E5DDD5; border-radius: 8px; padding: 8px 12px; font-size: 14px; color: #1E1E1E; font-family: inherit; outline: none; transition: box-shadow .15s; }
    input:focus, textarea:focus { box-shadow: 0 0 0 2px #E8B48A; border-color: #E8B48A; }
    textarea { resize: none; font-family: 'Courier New', monospace; font-size: 13px; }
    .form-group { margin-bottom: 16px; }

    /* Buttons */
    .btn-primary { width: 100%; background: #C4733A; color: white; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-primary:hover { background: #A85E2A; }
    .btn-primary:disabled { background: #E5DDD5; color: #9E8E88; cursor: not-allowed; }

<script type="text/babel">
const { useState } = React;

const sampleFeatures = [

  "Custom dashboards",
  "Slack integration",
  "Audit logs",
  "Mobile app",
  "Advanced permissions",
  "API access",
  "Bulk data export",
  "Workflow automation",
  "White-labeling",
];

const resultsData = [
  { name: "Single sign-on (SSO)", score: 94, wtp: 28, segment: "Enterprise" },
  { name: "API access", score: 81, wtp: 22, segment: "Technical" },
  { name: "Workflow automation", score: 76, wtp: 19, segment: "All" },
  { name: "Advanced permissions", score: 68, wtp: 14, segment: "Enterprise" },
  { name: "Slack integration", score: 61, wtp: 11, segment: "SMB" },
  { name: "Audit logs", score: 54, wtp: 10, segment: "Enterprise" },
  { name: "Custom dashboards", score: 47, wtp: 9, segment: "All" },
  { name: "Bulk data export", score: 38, wtp: 6, segment: "Technical" },
  { name: "Mobile app", score: 29, wtp: 4, segment: "SMB" },
  { name: "White-labeling", score: 18, wtp: 3, segment: "Enterprise" },
];

const maxDiffSets = [
  ["Single sign-on (SSO)", "Slack integration", "Custom dashboards", "Audit logs"],
  ["API access", "Mobile app", "Workflow automation", "White-labeling"],
  ["Advanced permissions", "Bulk data export", "Single sign-on (SSO)", "Slack integration"],
];

// Builds balanced MaxDiff sets from any feature list
const buildMaxDiffSets = (feats, setSize = 4) => {
  const n = feats.length;
  if (n <= setSize) return [feats.slice(0, setSize)];
  const numSets = Math.max(3, Math.ceil((n * 1.5) / setSize));
  const sets = [];
  // Step through with a stride so each feature appears roughly equally
  const stride = Math.ceil(n / setSize);
  for (let i = 0; i < numSets; i++) {
    const seen = new Set();
    const set = [];
    for (let j = 0; j < n && set.length < setSize; j++) {
      const idx = (i * stride + j) % n;
      if (!seen.has(idx)) { seen.add(idx); set.push(feats[idx]); }
    }
    sets.push(set);
  }
  return sets;
};

// Per-outcome ranked results data
const OUTCOME_DATA = {
  priority: [
    { name: "Single sign-on (SSO)", score: 94, segment: "Enterprise" },
    { name: "API access", score: 81, segment: "Technical" },
    { name: "Workflow automation", score: 76, segment: "All" },
    { name: "Advanced permissions", score: 68, segment: "Enterprise" },
    { name: "Slack integration", score: 61, segment: "SMB" },
    { name: "Audit logs", score: 54, segment: "Enterprise" },
    { name: "Custom dashboards", score: 47, segment: "All" },

const cleanFeatures = (rawText) => {
  return rawText.split("\n").map(line => {
    const trimmed = line.trim();
    if (!trimmed) return "";
    // Check for a match (case-insensitive)
    const match = Object.keys(LLM_CLEANUP_MAP).find(
      k => k.toLowerCase() === trimmed.toLowerCase()
    );
    return match ? LLM_CLEANUP_MAP[match] : trimmed;
  }).join("\n");
};

            const cellStyle = score => score >= 70

            const buildFirst  = featureItems.filter(f => f.avg >= 65).sort((a,b) => b.avg - a.avg);

            // Scatter axes: first two selected outcomes
            const xId = selectedOutcomes[0];

            const W = 368, H = 260, PAD = 46;
            const toX = s => PAD + (s / 100) * (W - PAD * 2);
            const toY = s => (H - PAD) - (s / 100) * (H - PAD * 2);
            const toR = s => 5 + (s / 100) * 8;
            const dotFill = avg => avg >= 65 ? "#C4733A" : avg >= 40 ? "#f59e0b" : "#9E8E88";

            return (
              <div>
                <div className="results-header">
                  <div>
                    <h1>{studyName}</h1>
                    <p className="results-meta">312 respondents · Completed March 14, 2026 · {AUDIENCES.find(a => a.id === audience)?.label}</p>
                  </div>
                  <button className="btn-sm">Export →</button>
                </div>

                <div className="rec-card">
                  <div className="rec-label">Top recommendation</div>
                  <div className="rec-text">{makeRec(tab, audience)}</div>
                </div>

                <div className="tabs">
                  {resultTabs.map(t => (
                    <button key={t.id} className={`tab ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>{t.label}</button>
                  ))}
                </div>

                {/* Per-outcome ranked list */}
                {selectedOutcomes.map(outcomeId => tab === outcomeId && (
                  <div key={outcomeId} className="list-card">
                    <div className="list-subheader" style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                      <span>{OUTCOME_SCORE_LABEL[outcomeId] || "Score out of 100"}</span>
                      {llmCleaned && <span style={{fontSize:10, color:"#C4733A", fontWeight:600}}>✦ hover name to see tested language</span>}
                    </div>
                    {(OUTCOME_DATA[outcomeId] || OUTCOME_DATA.priority).map((item, i) => {
                      const colors = OUTCOME_BAR_COLOR[outcomeId] || OUTCOME_BAR_COLOR.priority;
                      const barColor = i < 3 ? colors.high : i < 6 ? colors.mid : colors.low;
                      const testedLang = LLM_CLEANUP_MAP[item.name];
                      return (
                        <div key={item.name} className="list-row">
                          <span className="rank">{i+1}</span>
                          <span className="feat-name" style={{overflow:"visible"}}>
                            {llmCleaned && testedLang ? (
                              <span className="feat-tested">
                                {item.name}
                                <span className="feat-tested-icon">✦</span>
                                <span className="feat-tested-tip">
                                  <strong>Respondents saw</strong>
                                  "{testedLang}"
                                </span>
                              </span>
                            ) : item.name}
                          </span>
                          <div className="bar-wrap">
                            <div className="bar-bg">
                              <div className="bar-fill" style={{width: `${item.score}%`, background: barColor}} />
                            </div>
                            <span className="score">{item.score}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}

                {/* Feature Map — scatter + heatmap */}
                {tab === "map" && (
                  <div>
                    {/* Scatter plot */}
                    <div className="card" style={{marginBottom: 16, padding: "16px 16px 10px"}}>
                      <div style={{fontSize:12, fontWeight:600, color:"#6B5E5A", marginBottom:8}}>
                        Feature positioning — {xLabel} vs {yLabel}
                        {sizeId && <span style={{fontWeight:400, color:"#9E8E88"}}> · dot size = {OUTCOMES.find(o=>o.id===sizeId)?.label}</span>}
                      </div>
                      <svg width={W} height={H} style={{overflow:"visible", display:"block"}}>
                        {/* "Build first" quadrant highlight */}
                        <rect x={toX(50)} y={PAD} width={W-PAD-toX(50)} height={toY(50)-PAD} fill="#f0fdf4" opacity={0.7} rx={4}/>
                        <text x={W-PAD-6} y={PAD+13} textAnchor="end" fontSize={9} fill="#86efac" fontWeight={700}>Build first</text>
                        {/* Grid */}
                        {[25,50,75].map(v => (
                          <g key={v}>
                            <line x1={toX(v)} y1={PAD} x2={toX(v)} y2={H-PAD} stroke="#E5DDD5" strokeWidth={1} strokeDasharray="3,3"/>
                            <line x1={PAD} y1={toY(v)} x2={W-PAD} y2={toY(v)} stroke="#E5DDD5" strokeWidth={1} strokeDasharray="3,3"/>
                          </g>
                        ))}
                        {/* Axes */}
                        <line x1={PAD} y1={H-PAD} x2={W-PAD} y2={H-PAD} stroke="#C8BEBE" strokeWidth={1.5}/>
                        <line x1={PAD} y1={PAD} x2={PAD} y2={H-PAD} stroke="#C8BEBE" strokeWidth={1.5}/>
                        {/* Axis labels */}
                        <text x={W/2} y={H-4} textAnchor="middle" fontSize={10} fill="#9E8E88">{xLabel} →</text>
                        <text x={10} y={H/2} textAnchor="middle" fontSize={10} fill="#9E8E88" transform={`rotate(-90,10,${H/2})`}>{yLabel} →</text>
                        {/* Data points */}
                        {featureItems.map(item => {
                          const x = toX(item.scores[xId] || 50);
                          const y = toY(item.scores[yId] || item.scores[xId] || 50);
                          const r = toR(sizeId ? (item.scores[sizeId] || 50) : item.avg);
                          const fill = dotFill(item.avg);
                          const lbl = shortName(item.name);
                          const labelAbove = (item.scores[yId] || item.scores[xId] || 50) > 55;
                          return (
                            <g key={item.name}>
                              <circle cx={x} cy={y} r={r} fill={fill} opacity={0.85} stroke="white" strokeWidth={1.5}/>
                              <text x={x} y={labelAbove ? y - r - 4 : y + r + 10} textAnchor="middle" fontSize={9} fill="#4A3F3C">{lbl}</text>
                            </g>
                          );
                        })}
                      </svg>
                      <div style={{display:"flex", gap:14, marginTop:6, flexWrap:"wrap"}}>
                        {[{c:"#C4733A",l:"Strong across dimensions"},{c:"#f59e0b",l:"Selective appeal"},{c:"#9E8E88",l:"Low priority"}].map(({c,l}) => (
                          <div key={l} style={{display:"flex", alignItems:"center", gap:5, fontSize:10, color:"#6B5E5A"}}>
                            <div style={{width:8, height:8, borderRadius:"50%", background:c, flexShrink:0}}/>
                            {l}
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Heatmap table */}
                    <div className="list-card">
                      <div className="list-subheader" style={{display:"flex", alignItems:"center", gap:4, padding:"10px 16px"}}>
                        <span style={{flex:"0 0 140px"}}>Feature</span>
                        {selectedOutcomes.map(id => (
                          <span key={id} style={{flex:1, textAlign:"center", fontSize:10}}>{OUTCOMES.find(o=>o.id===id)?.label}</span>
                        ))}
                        <span style={{width:40, textAlign:"center", fontSize:10}}>Avg</span>
                      </div>
                      {[
                        {label:"Build first", color:"#C4733A", items: buildFirst},
                        {label:"Consider",    color:"#f59e0b", items: consider},
                        {label:"Low priority",color:"#9E8E88", items: lowPriority},
                      ].map(group => group.items.length > 0 && (
                        <React.Fragment key={group.label}>
                          <div style={{padding:"5px 16px", background:"#FAF7F4", borderTop:"1px solid #F0EAE4", display:"flex", alignItems:"center", gap:6}}>
                            <div style={{width:7, height:7, borderRadius:"50%", background:group.color}}/>
                            <span style={{fontSize:10, fontWeight:700, color:"#9E8E88", textTransform:"uppercase", letterSpacing:".05em"}}>{group.label}</span>
                          </div>
                          {group.items.map(item => {
                            const testedLang = LLM_CLEANUP_MAP[item.name];
                            return (
                            <div key={item.name} style={{padding:"8px 16px", display:"flex", alignItems:"center", gap:4, borderBottom:"1px solid #FAF7F4"}}>
                              <span style={{flex:"0 0 140px", fontSize:13, fontWeight:500, color:"#1E1E1E"}}>
                                {llmCleaned && testedLang ? (
                                  <span className="feat-tested">
                                    {shortName(item.name)}
                                    <span className="feat-tested-icon">✦</span>
                                    <span className="feat-tested-tip">
                                      <strong>Respondents saw</strong>
                                      "{testedLang}"
                                    </span>
                                  </span>
                                ) : shortName(item.name)}
                              </span>
                              {selectedOutcomes.map(id => {
                                const s = item.scores[id] || 0;
                                const cs = cellStyle(s);
                                return (
                                  <div key={id} style={{flex:1, display:"flex", justifyContent:"center"}}>
                                    <span style={{...cs, padding:"2px 8px", borderRadius:9999, fontSize:11, fontWeight:600, minWidth:30, textAlign:"center"}}>{s}</span>
                                  </div>
                                );
                              })}
                              <span style={{width:40, textAlign:"center", fontSize:12, fontWeight:700, color:"#1E1E1E"}}>{Math.round(item.avg)}</span>
                            </div>
                          ); })}
                        </React.Fragment>
                      ))}
                      <div className="list-footer">Scores out of 100 · Color: green ≥ 70, amber ≥ 45, gray &lt; 45 · Avg across all measured dimensions</div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
